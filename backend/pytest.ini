[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    api: Backend REST API tests (Layer 2)
    auth: Authentication / JWT gate tests (Layer 3)
    ingestion: File ingestion pipeline tests (Layer 4)
    graph: Graph intelligence tests (Layer 5)
    ml: ML scoring tests (Layer 6)
    websocket: WebSocket real-time tests (Layer 7)
    legal: Section 65B court-admissibility tests (Layer 8)
    slow: Tests that hit external APIs or take >10s
    gate: Pre-handover gate checks that MUST pass before government deployment
