name: FraudLens Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/fraudlens_test_secret
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p fraudlens_test_secret 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx openpyxl reportlab pytest-cov websockets

      - name: Generate synthetic test data
        run: |
          cd backend
          python tests/data_generator.py --transactions 500 --cases 25 --output tests/fixtures/

      - name: Run all tests with coverage
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: fraudlens_test_secret
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing

      - name: Pre-handover gate check — JWT must be enabled
        run: |
          cd backend
          python -m pytest tests/test_auth.py::test_auth_jwt_not_globally_disabled -v --tb=long
        continue-on-error: true  # WARNING: Remove 'continue-on-error' before government handover!

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

      - name: Run E2E tests
        run: npx playwright test tests/e2e/ --reporter=html

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
